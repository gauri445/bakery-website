<!DOCTYPE html>
<html>
<head>
    <title>Cakes & Bakes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fff8f5;
        }

        header {
            background-color: #8B0000;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #a80000;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        .hero {
            background: url('https://images.unsplash.com/photo-1509440159596-0249088772ff');
            background-size: cover;
            background-position: center;
            height: 300px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 5px black;
        }

        .products {
            padding: 30px;
            text-align: center;
        }

        .card {
            background: white;
            width: 250px;
            display: inline-block;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            border-radius: 8px;
        }

        button {
            background-color: #8B0000;
            color: white;
            border: none;
            padding: 8px 15px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        footer {
            background-color: #8B0000;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Cakes & Bakes</h1>
    <p>Freshly Baked Happiness!</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    FRESHLY BAKED & DELICIOUS
</div>

<section class="products">
    <h2>Our Best Sellers</h2>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587">
        <h3>Chocolate Cake</h3>
        <p>₹499</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307">
        <h3>Strawberry Cake</h3>
        <p>₹599</p>
        <button>Add to Cart</button>
    </div>

</section>

<footer>
    © 2026 Cakes & Bakes | cakesandbakes79@gmail.com
</footer>

</body>
</html>
