<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cakes and Bakes</title>

  <!-- CSS -->
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      background-color: #fff5f8;
    }

    h1 {
      background-color: pink;
      padding: 15px;
      margin: 0;
    }

    .cakes {
      padding: 20px;
    }

    .cake-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 600px;
      margin: auto;
    }

    .cake {
      border: 1px solid #ccc;
      padding: 10px;
      background: white;
      border-radius: 8px;
    }

    .cake img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 6px;
    }

    button {
      margin-top: 8px;
      padding: 8px 14px;
      background-color: pink;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
    }

    button:hover {
      background-color: hotpink;
      color: white;
    }

    #cart-message {
      color: green;
      font-size: 18px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- Main Heading -->
  <h1>🍰 Cakes and Bakes</h1>

  <!-- Cakes Section -->
  <section class="cakes">
    <h2>Our Cakes</h2>

    <div class="cake-list">

      <div class="cake">
        <img src="images/chocolate.jpg" alt="Chocolate Cake">
        <h3>Chocolate Cake</h3>
        <button onclick="addToCart('Chocolate Cake')">Add to Cart</button>
      </div>

      <div class="cake">
        <img src="images/strawberry.jpg" alt="Strawberry Cake">
        <h3>Strawberry Cake</h3>
        <button onclick="addToCart('Strawberry Cake')">Add to Cart</button>
      </div>

      <div class="cake">
        <img src="images/vanilla.jpg" alt="Vanilla Cake">
        <h3>Vanilla Cake</h3>
        <button onclick="addToCart('Vanilla Cake')">Add to Cart</button>
      </div>

      <div class="cake">
        <img src="images/fruit.jpg" alt="Fruit Cake">
        <h3>Fruit Cake</h3>
        <button onclick="addToCart('Fruit Cake')">Add to Cart</button>
      </div>

    </div>
  </section>

  <!-- Cart Message -->
  <p id="cart-message"></p>

  <!-- JavaScript -->
  <script>
    function addToCart(itemName) {
      document.getElementById("cart-message").innerText =
        itemName + " added to cart!";
    }
  </script>

</body>
</html>
